<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>公司A员工评价</title>
</head>
<body>
    <h1>员工评价</h1>

    <div class="review">
        <h3>员工1 - 2025年</h3>
        <p>公司整体不错，薪资水平在行业中上。年终奖比较稳定，一般3个月左右。工作强度适中，偶尔需要加班，但不会太晚。五险一金按全额工资缴纳，这一点很好。</p>
    </div>

    <div class="review">
        <h3>员工2 - 2024年</h3>
        <p>技术氛围很好，团队协作顺畅。公司重视技术人才培养，有定期的技术分享会。晋升通道比较明确，我入职2年已经晋升了一次。</p>
    </div>

    <div class="review">
        <h3>员工3 - 2025年</h3>
        <p>福利待遇不错，提供免费午餐和交通补贴。年假15天，比法定多一些。就是最近项目有点多，加班稍微多了点。</p>
    </div>
</body>
</html>
