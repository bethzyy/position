<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>公司B员工评价</title>
</head>
<body>
    <h1>员工评价</h1>

    <div class="review">
        <h3>员工1 - 2025年</h3>
        <p>公司氛围比较轻松，同事关系融洽。但是薪资水平一般，年终奖也不多，通常1-2个月。五险一金按基本工资缴纳，不是全额。</p>
    </div>

    <div class="review">
        <h3>员工2 - 2024年</h3>
        <p>工作生活平衡做得很好，基本不加班。但是技术团队规模比较小，技术分享和培训机会不多。成长空间可能受限。</p>
    </div>

    <div class="review">
        <h3>员工3 - 2025年</h3>
        <p>公司属于创业公司，业务发展不稳定。去年有过一次小规模裁员。福利方面比较基础，没有餐补和交通补贴。适合刚入行的年轻人积累经验。</p>
    </div>
</body>
</html>
